  <style>

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #fafafa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      padding: 14px 32px;
